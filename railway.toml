[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"
buildTarget = "production"

[deploy]
# Railway injects $PORT dynamically — override the Dockerfile CMD to use it
startCommand = "sh -c 'python -m uvicorn src.dashboard.backend.api.main:app --host 0.0.0.0 --port $PORT --workers 1'"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
