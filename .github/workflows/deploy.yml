name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  # ── Backend unit tests ──────────────────────────────────────────
  test-backend:
    name: Python Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-mock

      - name: Run unit tests
        run: >
          pytest tests/ -m "unit"
          --ignore=tests/ingestion/integration
          --ignore=tests/ingestion/performance
          -v -p no:cov

  # ── Frontend lint + type-check + build ─────────────────────────
  test-frontend:
    name: Frontend Lint, Type Check & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/dashboard/frontend-next

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/dashboard/frontend-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build:cf
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

  # ── Deploy backend to Railway production ───────────────────────
  deploy-backend-production:
    name: Deploy Backend → Railway Production
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway production
        run: railway up --service api --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

  # ── Deploy frontend to Cloudflare Pages production ──────────────
  deploy-frontend-production:
    name: Deploy Frontend → Cloudflare Pages (production)
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    environment: production

    defaults:
      run:
        working-directory: src/dashboard/frontend-next

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/dashboard/frontend-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:cf
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./out --project-name=quantstream-dashboard --branch=production
          workingDirectory: src/dashboard/frontend-next
