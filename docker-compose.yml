version: '3.8'

services:
  # ── Core Application ────────────────────────────────────────

  api:
    build:
      context: .
      target: development
    container_name: quantstream-api
    ports:
      - "18000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/quantstream
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SECRET_KEY=quantstream-dev-secret-key-change-in-prod
    volumes:
      - .:/app
      - ./data:/app/data
    command: >
      python -m uvicorn src.dashboard.backend.api.main:app
      --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quantstream-network

  frontend:
    build:
      context: ./src/dashboard/frontend-next
      dockerfile: Dockerfile
    container_name: quantstream-frontend
    ports:
      - "13000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:18000
      - NEXT_PUBLIC_WS_BASE_URL=ws://localhost:18000
      - NEXT_PUBLIC_USE_MOCK_DATA=false
      - API_PROXY_TARGET=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - quantstream-network

  # ── Data Storage ────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: quantstream-postgres
    environment:
      - POSTGRES_DB=quantstream
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quantstream-network

  redis:
    image: redis:7-alpine
    container_name: quantstream-redis
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - quantstream-network

  # ── Message Broker ──────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: quantstream-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - quantstream-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: quantstream-kafka
    ports:
      - "19092:9092"
      - "29092:29092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - quantstream-network

  # ── Monitoring ──────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: quantstream-prometheus
    ports:
      - "19090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - quantstream-network

  grafana:
    image: grafana/grafana:latest
    container_name: quantstream-grafana
    ports:
      - "13001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - quantstream-network

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  prometheus_data:
  grafana_data:

networks:
  quantstream-network:
    driver: bridge
