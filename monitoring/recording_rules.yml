# Prometheus recording rules for QuantStream Analytics Platform
# These rules pre-compute expensive queries and create derived metrics

groups:
  - name: quantstream_performance_recording
    interval: 15s
    rules:
      # Throughput metrics
      - record: quantstream:message_rate_5m
        expr: rate(quantstream_messages_processed_total[5m])

      - record: quantstream:message_rate_1m
        expr: rate(quantstream_messages_processed_total[1m])

      - record: quantstream:error_rate_5m
        expr: rate(quantstream_errors_total[5m])

      - record: quantstream:error_ratio_5m
        expr: quantstream:error_rate_5m / quantstream:message_rate_5m

      # Latency percentiles
      - record: quantstream:latency_p50_5m
        expr: histogram_quantile(0.5, rate(quantstream_message_processing_duration_seconds_bucket[5m]))

      - record: quantstream:latency_p95_5m
        expr: histogram_quantile(0.95, rate(quantstream_message_processing_duration_seconds_bucket[5m]))

      - record: quantstream:latency_p99_5m
        expr: histogram_quantile(0.99, rate(quantstream_message_processing_duration_seconds_bucket[5m]))

      - record: quantstream:latency_p999_5m
        expr: histogram_quantile(0.999, rate(quantstream_message_processing_duration_seconds_bucket[5m]))

      # Resource utilization
      - record: quantstream:memory_utilization
        expr: quantstream_memory_usage_bytes / quantstream_memory_limit_bytes

      - record: quantstream:cpu_utilization_5m
        expr: rate(quantstream_cpu_usage_seconds_total[5m])

      - record: quantstream:queue_utilization
        expr: quantstream_queue_size / quantstream_queue_capacity

  - name: quantstream_connector_recording
    interval: 30s
    rules:
      # API connector metrics
      - record: quantstream:api_request_rate_5m
        expr: rate(quantstream_api_requests_total[5m])

      - record: quantstream:api_error_rate_5m
        expr: rate(quantstream_api_errors_total[5m])

      - record: quantstream:api_error_ratio_5m
        expr: quantstream:api_error_rate_5m / quantstream:api_request_rate_5m

      - record: quantstream:api_latency_p95_5m
        expr: histogram_quantile(0.95, rate(quantstream_api_request_duration_seconds_bucket[5m]))

      # WebSocket connector metrics
      - record: quantstream:websocket_message_rate_5m
        expr: rate(quantstream_websocket_messages_received_total[5m])

      - record: quantstream:websocket_reconnect_rate_1h
        expr: rate(quantstream_websocket_reconnects_total[1h])

      # CSV connector metrics
      - record: quantstream:csv_processing_rate_5m
        expr: rate(quantstream_csv_records_processed_total[5m])

  - name: quantstream_kafka_recording
    interval: 30s
    rules:
      # Kafka producer metrics
      - record: quantstream:kafka_send_rate_5m
        expr: rate(quantstream_kafka_messages_sent_total[5m])

      - record: quantstream:kafka_send_latency_p95_5m
        expr: histogram_quantile(0.95, rate(quantstream_kafka_send_duration_seconds_bucket[5m]))

      - record: quantstream:kafka_error_rate_5m
        expr: rate(quantstream_kafka_errors_total[5m])

      - record: quantstream:kafka_batch_size_avg_5m
        expr: rate(quantstream_kafka_batch_size_sum[5m]) / rate(quantstream_kafka_batch_size_count[5m])

      - record: quantstream:kafka_dead_letter_rate_5m
        expr: rate(quantstream_kafka_dead_letter_messages_total[5m])

  - name: quantstream_business_metrics
    interval: 1m
    rules:
      # Message volume by symbol
      - record: quantstream:messages_by_symbol_5m
        expr: sum(rate(quantstream_messages_processed_total[5m])) by (symbol)

      # Message volume by data type
      - record: quantstream:messages_by_type_5m
        expr: sum(rate(quantstream_messages_processed_total[5m])) by (data_type)

      # Message volume by source
      - record: quantstream:messages_by_source_5m
        expr: sum(rate(quantstream_messages_processed_total[5m])) by (source)

      # Active symbols count
      - record: quantstream:active_symbols_count
        expr: count(count by (symbol)(rate(quantstream_messages_processed_total[5m]) > 0))

      # Data freshness by source
      - record: quantstream:data_freshness_seconds
        expr: time() - quantstream_last_message_timestamp

  - name: quantstream_availability_recording
    interval: 1m
    rules:
      # Service availability
      - record: quantstream:service_availability_5m
        expr: avg_over_time(up{job="quantstream-ingestion"}[5m])

      # Connector availability by type
      - record: quantstream:connector_availability_5m
        expr: avg_over_time(quantstream_connector_status[5m])

      # Pipeline health score (composite metric)
      - record: quantstream:pipeline_health_score
        expr: |
          (
            quantstream:service_availability_5m * 0.4 +
            (1 - clamp_max(quantstream:error_ratio_5m * 20, 1)) * 0.3 +
            clamp_max(quantstream:message_rate_5m / 100000, 1) * 0.2 +
            (1 - clamp_max(quantstream:latency_p99_5m * 10, 1)) * 0.1
          )

  - name: quantstream_capacity_planning
    interval: 5m
    rules:
      # Resource trends
      - record: quantstream:memory_usage_trend_1h
        expr: deriv(quantstream_memory_usage_bytes[1h])

      - record: quantstream:cpu_usage_trend_1h
        expr: deriv(quantstream:cpu_utilization_5m[1h])

      - record: quantstream:throughput_trend_1h
        expr: deriv(quantstream:message_rate_5m[1h])

      # Capacity utilization
      - record: quantstream:overall_capacity_utilization
        expr: |
          max(
            quantstream:memory_utilization,
            quantstream:cpu_utilization_5m,
            quantstream:queue_utilization
          )

      # Projected capacity exhaustion (simple linear extrapolation)
      - record: quantstream:memory_exhaustion_hours
        expr: |
          (quantstream_memory_limit_bytes - quantstream_memory_usage_bytes) / 
          clamp_min(quantstream:memory_usage_trend_1h * 3600, 1)

      - record: quantstream:queue_exhaustion_hours
        expr: |
          (quantstream_queue_capacity - quantstream_queue_size) / 
          clamp_min(deriv(quantstream_queue_size[1h]) * 3600, 1)