# Prometheus alerting rules for QuantStream Analytics Platform

groups:
  - name: quantstream_ingestion_alerts
    rules:
      # High-level service availability
      - alert: QuantStreamServiceDown
        expr: up{job="quantstream-ingestion"} == 0
        for: 30s
        labels:
          severity: critical
          service: quantstream-ingestion
        annotations:
          summary: "QuantStream ingestion service is down"
          description: "QuantStream ingestion service has been down for more than 30 seconds"

      # Performance alerts
      - alert: HighThroughputDrop
        expr: rate(quantstream_messages_processed_total[5m]) < 100000
        for: 2m
        labels:
          severity: warning
          service: quantstream-ingestion
        annotations:
          summary: "Message processing throughput is low"
          description: "Message processing rate is {{ $value }} msg/s, below 100K threshold"

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(quantstream_message_processing_duration_seconds_bucket[5m])) > 0.1
        for: 1m
        labels:
          severity: critical
          service: quantstream-ingestion
        annotations:
          summary: "High message processing latency"
          description: "P99 message processing latency is {{ $value }}s, above 100ms threshold"

      - alert: HighErrorRate
        expr: rate(quantstream_errors_total[5m]) / rate(quantstream_messages_processed_total[5m]) > 0.05
        for: 1m
        labels:
          severity: warning
          service: quantstream-ingestion
        annotations:
          summary: "High error rate in message processing"
          description: "Error rate is {{ $value | humanizePercentage }}, above 5% threshold"

      # Resource utilization alerts
      - alert: HighMemoryUsage
        expr: quantstream_memory_usage_bytes / quantstream_memory_limit_bytes > 0.9
        for: 2m
        labels:
          severity: warning
          service: quantstream-ingestion
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }} of limit"

      - alert: HighCPUUsage
        expr: rate(quantstream_cpu_usage_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
          service: quantstream-ingestion
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }}"

      # Queue and buffer alerts
      - alert: HighQueueUtilization
        expr: quantstream_queue_size / quantstream_queue_capacity > 0.8
        for: 1m
        labels:
          severity: warning
          service: quantstream-ingestion
        annotations:
          summary: "High queue utilization"
          description: "Queue utilization is {{ $value | humanizePercentage }}"

      - alert: BackpressureActive
        expr: quantstream_backpressure_active == 1
        for: 30s
        labels:
          severity: warning
          service: quantstream-ingestion
        annotations:
          summary: "Backpressure control is active"
          description: "Backpressure mechanism has been activated due to high load"

  - name: connector_alerts
    rules:
      # API connector alerts
      - alert: APIConnectorDown
        expr: quantstream_connector_status{type="rest_api"} == 0
        for: 1m
        labels:
          severity: critical
          service: quantstream-ingestion
        annotations:
          summary: "API connector is down"
          description: "API connector {{ $labels.connector_name }} is not operational"

      - alert: HighAPIErrorRate
        expr: rate(quantstream_api_errors_total[5m]) / rate(quantstream_api_requests_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: quantstream-ingestion
        annotations:
          summary: "High API error rate"
          description: "API error rate is {{ $value | humanizePercentage }} for {{ $labels.provider }}"

      - alert: APIRateLimitHit
        expr: quantstream_api_rate_limit_hits_total > 0
        for: 0s
        labels:
          severity: warning
          service: quantstream-ingestion
        annotations:
          summary: "API rate limit reached"
          description: "Rate limit reached for {{ $labels.provider }} API"

      # WebSocket connector alerts
      - alert: WebSocketConnectorDown
        expr: quantstream_connector_status{type="websocket"} == 0
        for: 30s
        labels:
          severity: critical
          service: quantstream-ingestion
        annotations:
          summary: "WebSocket connector is down"
          description: "WebSocket connector {{ $labels.connector_name }} is disconnected"

      - alert: FrequentWebSocketReconnects
        expr: rate(quantstream_websocket_reconnects_total[10m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: quantstream-ingestion
        annotations:
          summary: "Frequent WebSocket reconnections"
          description: "WebSocket connector {{ $labels.connector_name }} is reconnecting frequently"

  - name: kafka_alerts
    rules:
      # Kafka producer alerts
      - alert: KafkaProducerDown
        expr: quantstream_kafka_producer_status == 0
        for: 30s
        labels:
          severity: critical
          service: quantstream-ingestion
        annotations:
          summary: "Kafka producer is down"
          description: "Kafka producer is not operational"

      - alert: HighKafkaLatency
        expr: histogram_quantile(0.95, rate(quantstream_kafka_send_duration_seconds_bucket[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
          service: quantstream-ingestion
        annotations:
          summary: "High Kafka send latency"
          description: "P95 Kafka send latency is {{ $value }}s, above 50ms threshold"

      - alert: KafkaDeadLetterQueueGrowth
        expr: increase(quantstream_kafka_dead_letter_messages_total[5m]) > 100
        for: 1m
        labels:
          severity: warning
          service: quantstream-ingestion
        annotations:
          summary: "Dead letter queue growing"
          description: "{{ $value }} messages sent to dead letter queue in last 5 minutes"

  - name: data_quality_alerts
    rules:
      # Data validation alerts
      - alert: HighValidationErrorRate
        expr: rate(quantstream_validation_errors_total[5m]) / rate(quantstream_messages_processed_total[5m]) > 0.02
        for: 2m
        labels:
          severity: warning
          service: quantstream-ingestion
        annotations:
          summary: "High data validation error rate"
          description: "Validation error rate is {{ $value | humanizePercentage }}, above 2% threshold"

      - alert: MissingDataFeeds
        expr: absent_over_time(quantstream_messages_received_total{source!=""}[5m])
        for: 2m
        labels:
          severity: warning
          service: quantstream-ingestion
        annotations:
          summary: "Data feed appears to be missing"
          description: "No messages received from {{ $labels.source }} in the last 5 minutes"

      # Data freshness alerts
      - alert: StaleData
        expr: time() - quantstream_last_message_timestamp > 300
        for: 1m
        labels:
          severity: warning
          service: quantstream-ingestion
        annotations:
          summary: "Data appears stale"
          description: "Last message received {{ $value }}s ago, above 5 minute threshold"