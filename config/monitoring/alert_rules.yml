# Prometheus Alert Rules for QuantStream Analytics

groups:
  - name: quantstream_system_alerts
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% for more than 2 minutes on {{ $labels.instance }}"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is above 85% on {{ $labels.instance }}"

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_free_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"})) * 100 > 90
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Disk space running low"
          description: "Disk usage is above 90% on {{ $labels.instance }}"

  - name: quantstream_application_alerts
    rules:
      - alert: DashboardDown
        expr: up{job="quantstream-dashboard"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "QuantStream Dashboard is down"
          description: "Dashboard service has been down for more than 30 seconds"

      - alert: APIDown
        expr: up{job="quantstream-api"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "QuantStream API is down"
          description: "API service has been down for more than 30 seconds"

      - alert: WebSocketDown
        expr: up{job="quantstream-websocket"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "WebSocket server is down"
          description: "WebSocket service has been down for more than 30 seconds"

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is above 300ms"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for the last 5 minutes"

  - name: quantstream_data_alerts
    rules:
      - alert: DataIngestionStopped
        expr: increase(data_ingestion_total[5m]) == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Data ingestion has stopped"
          description: "No data has been ingested for more than 2 minutes"

      - alert: DataQualityIssue
        expr: data_quality_score < 0.95
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Data quality score is low"
          description: "Data quality score has dropped below 95%"

  - name: quantstream_redis_alerts
    rules:
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis service has been down for more than 30 seconds"

      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis memory usage is above 90%"