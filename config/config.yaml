# QuantStream Analytics Platform Configuration
app_name: "quantstream-ingestion"
version: "1.0.0"
environment: "development"
debug: true

# Database Configuration
database:
  host: "localhost"
  port: 5432
  database: "quantstream"
  username: "quantstream_user"
  password: "${DATABASE_PASSWORD}"
  ssl_enabled: true
  connection_pool_size: 10
  connection_timeout: 30

# Kafka Configuration
kafka:
  bootstrap_servers:
    - "localhost:9092"
  security_protocol: "PLAINTEXT"
  producer_config:
    acks: "all"
    retries: 5
    batch_size: 32768
    linger_ms: 10
    compression_type: "lz4"
    enable_idempotence: true
  topic_config:
    market_data_quotes:
      num_partitions: 12
      replication_factor: 3
      config:
        compression.type: "lz4"
        cleanup.policy: "delete"
        retention.ms: 86400000  # 1 day
    market_data_trades:
      num_partitions: 12
      replication_factor: 3
      config:
        compression.type: "lz4"
        cleanup.policy: "delete"
        retention.ms: 604800000  # 7 days
    market_data_bars:
      num_partitions: 6
      replication_factor: 3
      config:
        compression.type: "lz4"
        cleanup.policy: "compact,delete"
        retention.ms: 2592000000  # 30 days

# Redis Configuration
redis:
  host: "localhost"
  port: 6379
  database: 0
  password: "${REDIS_PASSWORD}"
  ssl_enabled: false
  connection_pool_size: 10
  socket_timeout: 5

# Monitoring Configuration
monitoring:
  enabled: true
  metrics_port: 8080
  metrics_path: "/metrics"
  log_level: "INFO"
  prometheus_enabled: true
  alert_manager_url: "http://localhost:9093"

# Performance Configuration
performance:
  max_workers: 4
  message_buffer_size: 10000
  batch_processing_size: 1000
  compression_enabled: true
  compression_type: "gzip"
  memory_limit_mb: 2048
  cpu_limit_percent: 80

# Directory Configuration
data_directory: "./data"
log_directory: "./logs"
config_directory: "./config"
temp_directory: "./temp"

# Feature Flags
features:
  real_time_processing: true
  batch_processing: true
  data_validation: true
  schema_registry: true
  dead_letter_queue: true
  metrics_collection: true
  health_checks: true
  hot_reload: true

# Connector Configurations
connectors:
  alpha_vantage_api:
    name: "alpha_vantage_api"
    type: "rest_api"
    data_source: "alpha_vantage"
    enabled: true
    symbols:
      - "AAPL"
      - "GOOGL"
      - "MSFT"
      - "TSLA"
      - "AMZN"
    data_types:
      - "quote"
      - "bar"
    batch_size: 100
    max_queue_size: 5000
    timeout: 30
    max_retries: 3
    retry_delay: 1.0
    custom_config:
      function: "TIME_SERIES_INTRADAY"
      interval: "1min"
      outputsize: "compact"

  yahoo_finance_api:
    name: "yahoo_finance_api"
    type: "rest_api"
    data_source: "yahoo_finance"
    enabled: true
    symbols:
      - "AAPL"
      - "GOOGL"
      - "MSFT"
    data_types:
      - "quote"
      - "bar"
    batch_size: 50
    max_queue_size: 2000

  finnhub_websocket:
    name: "finnhub_websocket"
    type: "websocket"
    data_source: "finnhub"
    enabled: false  # Disabled by default
    symbols:
      - "AAPL"
      - "GOOGL"
      - "MSFT"
    data_types:
      - "trade"
      - "quote"
    batch_size: 200
    max_queue_size: 10000
    custom_config:
      heartbeat_interval: 30.0
      reconnect_delay: 5.0
      max_reconnect_attempts: 10

  polygon_websocket:
    name: "polygon_websocket"
    type: "websocket"
    data_source: "polygon"
    enabled: false  # Disabled by default
    symbols:
      - "AAPL"
      - "GOOGL"
      - "MSFT"
    data_types:
      - "trade"
      - "quote"
      - "bar"
    batch_size: 500
    max_queue_size: 20000

  historical_csv:
    name: "historical_csv"
    type: "csv_file"
    data_source: "csv_file"
    enabled: false  # Disabled by default
    data_types:
      - "bar"
      - "trade"
    batch_size: 1000
    custom_config:
      directory_path: "./data/historical"
      file_pattern: "*.csv"
      auto_detect_schema: true
      data_validation: true
      parallel_processing: true
      incremental_processing: true
      checkpoint_file: "./data/checkpoints/csv_processed.txt"

# API Endpoint Configurations
api_endpoints:
  alpha_vantage:
    name: "alpha_vantage"
    base_url: "https://www.alphavantage.co/query"
    rate_limit: 5  # requests per minute for free tier
    timeout: 30
    max_retries: 3
    retry_delay: 1.0
    headers:
      User-Agent: "QuantStream-Ingestion/1.0"

  yahoo_finance:
    name: "yahoo_finance"
    base_url: "https://query1.finance.yahoo.com"
    rate_limit: 60
    timeout: 30
    max_retries: 3
    retry_delay: 1.0

  iex_cloud:
    name: "iex_cloud"
    base_url: "https://cloud.iexapis.com/stable"
    rate_limit: 500
    timeout: 30
    max_retries: 3
    retry_delay: 1.0

  finnhub:
    name: "finnhub"
    base_url: "https://finnhub.io/api/v1"
    rate_limit: 60
    timeout: 30
    max_retries: 3
    retry_delay: 1.0

  polygon:
    name: "polygon"
    base_url: "https://api.polygon.io"
    rate_limit: 1000
    timeout: 30
    max_retries: 3
    retry_delay: 1.0